name: Build StreamChamps APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk StreamChampsSportsHub.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamChampsSportsHub
          path: StreamChampsSportsHub.apk
