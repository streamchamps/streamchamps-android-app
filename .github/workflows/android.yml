name: Build StreamChamps APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Find project and build APK
        run: |
          PROJECT_DIR=$(dirname $(find . -name "settings.gradle" | head -n 1))
          echo "Project directory: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleDebug

      - name: Copy APK
        run: |
          APK_PATH=$(find . -path "*/app/build/outputs/apk/debug/app-debug.apk" | head -n 1)
          cp "$APK_PATH" StreamChampsSportsHub.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamChampsSportsHub
          path: StreamChampsSportsHub.apk
